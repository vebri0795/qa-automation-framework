# Carpeta donde Allure escribe los archivos de resultados (uno por test,
# en formato JSON) durante "mvn test". Después, la herramienta Allure lee
# esta carpeta para generar el reporte HTML.
#
# La convencion es que viva dentro de target/ (la carpeta que Maven usa
# para todo lo generado por el build y que normalmente NO se sube a git).
allure.results.directory=target/allure-results
